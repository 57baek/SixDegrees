services:
  - type: web
    name: sixdegrees-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    workingDir: backend
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GLOBAL_COMPUTE_ENABLED
        value: "true"
